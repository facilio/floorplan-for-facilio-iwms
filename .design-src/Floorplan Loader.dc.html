<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/facilio-atom-design-system-262fe304-f14e-49f6-a3e4-920d99af3d20/colors_and_type.css">
  <style>
    @keyframes fpl-draw { to { stroke-dashoffset: 0; } }
    @keyframes fpl-sweep { 0% { transform: translateX(-45%); } 100% { transform: translateX(150%); } }
    @keyframes fpl-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    @keyframes fpl-dots { 0%,80%,100% { opacity:.25; } 40% { opacity:1; } }
    @keyframes fpl-textin { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }
    @keyframes fpl-wave { 0%,100% { opacity:.4; } 50% { opacity:1; } }
    @keyframes fpl-beam { 0% { left:-14%; } 100% { left:104%; } }
    /* first-pass reveal, then settle into a gentle looping shimmer */
    .fpl-f { opacity:0; animation: fpl-rise .5s cubic-bezier(0.2,0,0,1) forwards, fpl-wave 2.8s ease-in-out 2s infinite; }
    @keyframes fpl-rise { from { opacity:0; } to { opacity:1; } }
  </style>
</helmet>
<div style="position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:34px; background:#F7F9FC; font-family:var(--font-sans, 'Roboto', sans-serif);">

  <div style="position:relative; width:432px; height:312px;">
    <div style="position:absolute; inset:0; background:#fff; border:1px solid var(--ink-200, #D8E3F1); border-radius:16px; box-shadow:0 14px 38px rgba(40,54,72,0.10); overflow:hidden;">
      <svg viewBox="0 0 432 312" width="432" height="312" fill="none" style="position:absolute; inset:0;">

        <!-- room zone tints -->
        <g class="fpl-f" style="animation-delay:1.5s;">
          <rect x="40" y="40" width="120" height="120" fill="rgba(0,89,214,0.03)"></rect>
          <rect x="278" y="40" width="114" height="120" fill="rgba(46,209,255,0.045)"></rect>
          <rect x="278" y="176" width="114" height="96" fill="rgba(41,160,30,0.04)"></rect>
        </g>

        <!-- ===== interior walls (draw in) ===== -->
        <g stroke="#98A4B8" stroke-width="7" stroke-linecap="butt">
          <!-- left vertical divider (x=160) with door gap 92-124 -->
          <path d="M160 40 V92" stroke-dasharray="200" stroke-dashoffset="200" style="animation: fpl-draw .8s cubic-bezier(0.2,0,0,1) .5s forwards;"></path>
          <path d="M160 124 V272" stroke-dasharray="200" stroke-dashoffset="200" style="animation: fpl-draw .95s cubic-bezier(0.2,0,0,1) .62s forwards;"></path>
          <!-- right vertical divider (x=278) with door gaps 92-120 and 196-224 -->
          <path d="M278 40 V92" stroke-dasharray="200" stroke-dashoffset="200" style="animation: fpl-draw .8s cubic-bezier(0.2,0,0,1) .58s forwards;"></path>
          <path d="M278 120 V196" stroke-dasharray="200" stroke-dashoffset="200" style="animation: fpl-draw .8s cubic-bezier(0.2,0,0,1) .7s forwards;"></path>
          <path d="M278 224 V272" stroke-dasharray="200" stroke-dashoffset="200" style="animation: fpl-draw .7s cubic-bezier(0.2,0,0,1) .8s forwards;"></path>
          <!-- left horizontal divider (y=176) door gap 96-128 -->
          <path d="M40 176 H96" stroke-dasharray="200" stroke-dashoffset="200" style="animation: fpl-draw .8s cubic-bezier(0.2,0,0,1) .72s forwards;"></path>
          <path d="M128 176 H160" stroke-dasharray="120" stroke-dashoffset="120" style="animation: fpl-draw .6s cubic-bezier(0.2,0,0,1) .84s forwards;"></path>
          <!-- bathroom bottom wall (y=160, x 160-278) door gap 205-235 -->
          <path d="M160 160 H205" stroke-dasharray="120" stroke-dashoffset="120" style="animation: fpl-draw .7s cubic-bezier(0.2,0,0,1) .8s forwards;"></path>
          <path d="M235 160 H278" stroke-dasharray="120" stroke-dashoffset="120" style="animation: fpl-draw .6s cubic-bezier(0.2,0,0,1) .9s forwards;"></path>
          <!-- right horizontal divider (y=176, x 278-392) door gap 300-330 -->
          <path d="M278 176 H300" stroke-dasharray="120" stroke-dashoffset="120" style="animation: fpl-draw .6s cubic-bezier(0.2,0,0,1) .86s forwards;"></path>
          <path d="M330 176 H392" stroke-dasharray="120" stroke-dashoffset="120" style="animation: fpl-draw .7s cubic-bezier(0.2,0,0,1) .96s forwards;"></path>
        </g>

        <!-- ===== outer wall (draw last, on top) ===== -->
        <rect x="40" y="40" width="352" height="232" rx="3" stroke="#7E8CA3" stroke-width="9" stroke-linejoin="round" stroke-dasharray="1200" stroke-dashoffset="1200" style="animation: fpl-draw 1.5s cubic-bezier(0.2,0,0,1) forwards;"></rect>

        <!-- ===== windows (cut into outer wall) ===== -->
        <g class="fpl-f" style="animation-delay:1.5s;">
          <!-- top wall windows -->
          <rect x="86" y="35.5" width="42" height="9" fill="#fff"></rect><rect x="88" y="38.5" width="38" height="3" rx="1.5" fill="#E3E9F2"></rect>
          <rect x="196" y="35.5" width="42" height="9" fill="#fff"></rect><rect x="198" y="38.5" width="38" height="3" rx="1.5" fill="#E3E9F2"></rect>
          <rect x="306" y="35.5" width="42" height="9" fill="#fff"></rect><rect x="308" y="38.5" width="38" height="3" rx="1.5" fill="#E3E9F2"></rect>
          <!-- left wall window -->
          <rect x="35.5" y="96" width="9" height="42" fill="#fff"></rect><rect x="38.5" y="98" width="3" height="38" rx="1.5" fill="#E3E9F2"></rect>
          <!-- right wall window -->
          <rect x="387.5" y="200" width="9" height="42" fill="#fff"></rect><rect x="390.5" y="202" width="3" height="38" rx="1.5" fill="#E3E9F2"></rect>
          <!-- bottom wall window -->
          <rect x="196" y="267.5" width="42" height="9" fill="#fff"></rect><rect x="198" y="270.5" width="38" height="3" rx="1.5" fill="#E3E9F2"></rect>
        </g>

        <!-- ===== door swing arcs ===== -->
        <g stroke="#B4BFD0" stroke-width="1.4" fill="none">
          <path d="M160 124 A32 32 0 0 0 192 92" stroke-dasharray="60" stroke-dashoffset="60" style="animation: fpl-draw .45s ease 1.5s forwards;"></path>
          <path d="M160 176 A32 32 0 0 1 128 208" stroke-dasharray="60" stroke-dashoffset="60" style="animation: fpl-draw .45s ease 1.6s forwards;"></path>
          <path d="M278 92 A30 30 0 0 1 248 122" stroke-dasharray="58" stroke-dashoffset="58" style="animation: fpl-draw .45s ease 1.55s forwards;"></path>
          <path d="M278 196 A28 28 0 0 0 306 224" stroke-dasharray="54" stroke-dashoffset="54" style="animation: fpl-draw .45s ease 1.65s forwards;"></path>
          <path d="M205 160 A30 30 0 0 1 235 190" stroke-dasharray="58" stroke-dashoffset="58" style="animation: fpl-draw .45s ease 1.6s forwards;"></path>
        </g>

        <!-- ===== furniture (light) ===== -->
        <g stroke="#C4CEDD" stroke-width="1.4" fill="#F2F5FA" stroke-linejoin="round">
          <!-- LIVING: sofa + coffee + plant -->
          <g class="fpl-f" style="animation-delay:1.15s;">
            <rect x="54" y="54" width="52" height="22" rx="3"></rect>
            <rect x="57" y="50" width="46" height="7" rx="2.5"></rect>
            <line x1="80" y1="56" x2="80" y2="74"></line>
          </g>
          <g class="fpl-f" style="animation-delay:1.24s;"><circle cx="72" cy="112" r="14"></circle></g>
          <g class="fpl-f" style="animation-delay:1.32s; fill:none; stroke:#B9C6D9;">
            <circle cx="124" cy="100" r="3.5" fill="#EAF1FA"></circle>
            <path d="M124 100 L124 90 M124 100 L133 96 M124 100 L131 108 M124 100 L117 108 M124 100 L115 96"></path>
            <rect x="120" y="112" width="8" height="7" rx="1" fill="#F2F5FA"></rect>
          </g>

          <!-- BATHROOM: tub + toilet + sink -->
          <g class="fpl-f" style="animation-delay:1.2s;">
            <rect x="170" y="52" width="26" height="52" rx="8"></rect>
            <rect x="174" y="60" width="18" height="40" rx="6" fill="#fff"></rect>
          </g>
          <g class="fpl-f" style="animation-delay:1.28s;">
            <rect x="230" y="52" width="20" height="9" rx="2"></rect>
            <ellipse cx="240" cy="70" rx="10" ry="11"></ellipse>
          </g>
          <g class="fpl-f" style="animation-delay:1.36s;">
            <rect x="228" y="92" width="26" height="16" rx="3"></rect>
            <ellipse cx="241" cy="100" rx="7" ry="5" fill="#fff"></ellipse>
          </g>

          <!-- BEDROOM 1 (top-right): bed -->
          <g class="fpl-f" style="animation-delay:1.3s;">
            <rect x="316" y="54" width="58" height="44" rx="3"></rect>
            <rect x="320" y="58" width="50" height="14" rx="2" fill="#fff"></rect>
            <rect x="352" y="52" width="12" height="10" rx="2"></rect>
          </g>

          <!-- BEDROOM 2 (bottom-left): bed -->
          <g class="fpl-f" style="animation-delay:1.4s;">
            <rect x="56" y="196" width="46" height="60" rx="3"></rect>
            <rect x="60" y="200" width="38" height="14" rx="2" fill="#fff"></rect>
          </g>

          <!-- DINING: table + chairs -->
          <g class="fpl-f" style="animation-delay:1.34s;">
            <rect x="196" y="204" width="46" height="30" rx="4"></rect>
            <rect x="200" y="192" width="16" height="9" rx="2"></rect>
            <rect x="222" y="192" width="16" height="9" rx="2"></rect>
            <rect x="200" y="237" width="16" height="9" rx="2"></rect>
            <rect x="222" y="237" width="16" height="9" rx="2"></rect>
          </g>

          <!-- KITCHEN: counter + stove + sink -->
          <g class="fpl-f" style="animation-delay:1.44s;">
            <rect x="300" y="240" width="86" height="20" rx="2"></rect>
            <rect x="366" y="196" width="20" height="44" rx="2"></rect>
            <rect x="312" y="244" width="18" height="12" rx="2" fill="#fff"></rect>
            <circle cx="352" cy="250" r="3.5"></circle>
            <circle cx="362" cy="250" r="3.5"></circle>
            <circle cx="352" cy="256" r="2.6"></circle>
            <ellipse cx="376" cy="212" rx="6" ry="8" fill="#fff"></ellipse>
          </g>
        </g>
      </svg>

      <!-- scan beam -->
      <div style="position:absolute; top:0; bottom:0; width:120px; margin-left:-60px; background:linear-gradient(90deg, rgba(0,89,214,0) 0%, rgba(0,89,214,0.10) 46%, rgba(0,89,214,0.16) 50%, rgba(0,89,214,0.10) 54%, rgba(0,89,214,0) 100%); animation: fpl-beam 2.6s cubic-bezier(0.45,0,0.55,1) infinite;"></div>
      <div style="position:absolute; top:14px; bottom:14px; width:2px; margin-left:-1px; background:linear-gradient(180deg, rgba(0,89,214,0), var(--blue-500,#0059D6), rgba(0,89,214,0)); box-shadow:0 0 10px rgba(0,89,214,0.55); animation: fpl-beam 2.6s cubic-bezier(0.45,0,0.55,1) infinite;"></div>
    </div>
  </div>

  <div style="display:flex; flex-direction:column; align-items:center; gap:16px;">
    <div style="position:relative; width:220px; height:5px; border-radius:999px; background:var(--ink-100, #E9EFF7); overflow:hidden;">
      <div style="position:absolute; inset:0; width:45%; border-radius:999px; background:var(--blue-500, #0059D6); animation: fpl-bar 1.5s cubic-bezier(0.4,0,0.2,1) infinite;"></div>
    </div>
    <div style="display:flex; align-items:center; gap:2px; height:20px; font:500 14px/1 var(--font-sans, 'Roboto', sans-serif); color:var(--ink-700, #40536E);">
      <span key="{{ msgKey }}" style="animation: fpl-textin .32s cubic-bezier(0.2,0,0,1);">{{ message }}</span>
      <span style="animation: fpl-dots 1.4s ease infinite;">.</span>
      <span style="animation: fpl-dots 1.4s ease 0.2s infinite;">.</span>
      <span style="animation: fpl-dots 1.4s ease 0.4s infinite;">.</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:600,&quot;height&quot;:480}}">
class Component extends DCLogic {
  MESSAGES = [
    'Loading floor plan',
    'Setting up your space',
    'Placing rooms and furniture',
    'Syncing live availability',
    'Almost ready',
  ];
  state = { i: 0 };
  componentDidMount() {
    this._t = setInterval(() => this.setState(s => ({ i: (s.i + 1) % this.MESSAGES.length })), 1900);
  }
  componentWillUnmount() { clearInterval(this._t); }
  renderVals() {
    return { message: this.MESSAGES[this.state.i], msgKey: 'm' + this.state.i };
  }
}
</script>
</body>
</html>
